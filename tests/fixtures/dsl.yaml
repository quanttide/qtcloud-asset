# ========== 顶层结构 ==========
version: "0.1" # ISDL 版本，不是契约版本
contract_id: ~ # 实际由内容寻址 CID 填充，不在 YAML 里写
human_title: "飞书文档 → GitHub Issue" # 给 UI 展示的标题，不参与逻辑
human_description: "当飞书文档被标记为「待同步」时，自动创建 GitHub Issue" # 纯展示

# 1. 资产声明 (asset)
assets:
  - id: "feishu_doc"
    platform: "feishu" # 适配器标识
    asset_type: "doc" # 平台内的资源类型
    schema: # 约束该资产必须满足的结构（可选）
      required_fields: ["doc_id", "title", "url"]
      # 状态约束（例如：文档必须有关键标签）
      constraints:
        - "tags contains 'sync-to-github'"

  - id: "github_issue"
    platform: "github"
    asset_type: "issue"
    schema:
      required_fields: ["repo", "title", "body"]

# 2. 转换规则 (transform)
transforms:
  - id: "feishu_to_issue"
    description: "将飞书文档转换为 GitHub Issue" # 也是纯展示
    # 输入输出引用 assets
    input_asset: "feishu_doc"
    output_asset: "github_issue"

    # 转换逻辑：引用外部适配器实现的 action，或者内联表达式
    action: "github.create_issue"
    # action 的参数（适配器需要的字段）
    params:
      repo: "{{ contract.settings.target_repo }}" # 可在部署时绑定
      title: "【同步】{{ input.title }}"
      body: |
        来自飞书文档: {{ input.url }}
        内容摘要: {{ input.content | truncate(200) }}

    # 条件（可选，满足时才执行）
    condition: "input.title contains '紧急' or input.tags contains 'high-priority'"

    # 注释（公理一）：纯粹给人看，引擎忽略
    # annotation: "仅当标题含「紧急」或标签含「high-priority」时才创建 Issue"

    # 错误处理（公理三）
    error_handling:
      max_retries: 3
      retry_delay: "exponential" # 1s, 2s, 4s
      on_failure: "suspend" # 唯一合法值
      dlq_binding: "sre_dlq" # 死信队列标识
      escalation: # 超时升级
        role: "workflow_admin"
        timeout: "4h"

# 3. 触发器 (trigger)
triggers:
  - id: "on_doc_labeled"
    description: "当飞书文档被添加特定标签时触发"
    # 事件源
    source:
      platform: "feishu"
      event_type: "document.label_added"
      filters: # 过滤条件
        - "label.name == 'sync-to-github'"
    # 绑定要执行的 transform
    transform_ref: "feishu_to_issue"
    # 可选：并发控制
    concurrency:
      max_in_flight: 5
      strategy: "block" # block / drop_oldest

# 4. 生命周期与治理 (lifecycle)
lifecycle:
  # 状态机（公理二：合并导致 pending_review）
  state: "draft" # draft | pending_review | active | suspended | archived

  # 血缘关系（内容寻址）
  lineage:
    forked_from: [] # 数组，每个元素是 CID
    # 注意：引擎不会自动合并，只记录血缘。一旦 fork_from 非空，必须走 review

  # 审批/门禁（对应公理二的 PR 模型）
  review:
    required_approvals: 1
    approver_roles: ["contract_owner", "platform_admin"]
    # 审批通过后自动转为 active

  # 部署绑定（运行时注入）
  bindings:
    - platform: "feishu"
      credential_ref: "secret/feishu-app-token" # 外部密钥引用
    - platform: "github"
      credential_ref: "secret/github-pat"
    - settings:
        target_repo: "my-org/docs-sync" # 注入 transform 中用到的变量

  # 健康检查（对应公理三的显式暂停）
  health_check:
    enabled: true
    interval: "1d"
    # 检查适配器是否仍可用
    checks:
      - type: "adapter_health"
        platform: "feishu"
      - type: "adapter_health"
        platform: "github"
    on_unhealthy: "suspend" # 健康检查失败 -> 契约实例 suspended
