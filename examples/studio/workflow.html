<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>数字资产云</title>
<style>
body{background:#151c28;font-family:-apple-system,sans-serif;display:flex;justify-content:center;padding:60px 20px}
.flow{display:flex;flex-direction:column;align-items:center}
.nd{padding:14px 36px;border:1px solid #3a4862;text-align:center;min-width:160px}
.nd b{display:block;font-size:15px;color:#dce1eb;font-weight:600}
.nd span{display:block;font-size:11px;color:#7a8699;margin-top:5px}
.rl{display:flex;flex-direction:column;align-items:center;height:52px}
.rl .ln{width:1px;flex:1;background:#3a4862}
.rl .tg{font-size:11px;color:#7a8699;padding:2px 0}
.rl .ah{width:0;height:0;border-left:4px solid transparent;border-right:4px solid transparent;border-top:5px solid #3a4862}
</style>
</head>
<body>
<div class="flow">
  <div class="nd"><b>BRD</b><span>业务需求文档</span></div>
  <div class="rl"><div class="ln"></div><div class="tg">转化</div><div class="ah"></div></div>
  <div class="nd"><b>PRD</b><span>产品需求文档</span></div>
  <div class="rl"><div class="ln"></div><div class="tg">驱动</div><div class="ah"></div></div>
  <div class="nd"><b>ADD</b><span>架构设计文档</span></div>
  <div class="rl"><div class="ln"></div><div class="tg">验证</div><div class="ah"></div></div>
  <div class="nd"><b>QA</b><span>质量保证文档</span></div>
  <div class="rl"><div class="ln"></div><div class="tg">交付</div><div class="ah"></div></div>
  <div class="nd"><b>USER</b><span>用户文档</span></div>
</div>
</body>
</html>
