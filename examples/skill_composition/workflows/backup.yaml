# 工作流：备份

workflow:
  name: 备份
  description: 将数据复制并压缩为 ZIP 包

  # 工作流公式：列举文件 → 复制文件 → 压缩文件 → 验收结果
  formula: list_files → copy_files → compress → verify

skills:
  - id: list_files
    name: 列举文件
    description: 列出需要备份的文件
    params:
      source: data/journal
      pattern: "*"

  - id: copy_files
    name: 复制文件
    description: 将文件复制到备份目录
    params:
      source: data/journal
      destination: data/archive

  - id: compress
    name: 压缩文件
    description: 将备份目录压缩为 ZIP 文件
    params:
      source: data/archive
      output: backup.zip
      level: 6

  - id: verify
    name: 验收结果
    description: 验证压缩包是否创建成功
    params:
      check: archive_exists
      file: data/archive/backup.zip

execution:
  mode: sync
  continue_on_error: false
  rollback_on_fail: true

example:
  input:
    source: data/journal
  output:
    archive: data/archive/backup.zip
    size: 1024000
    verified: true
