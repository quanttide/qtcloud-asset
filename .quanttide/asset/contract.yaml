# 量潮数字资产云 — 专用契约
# 模块定位：数字资产管理基础设施层（契约定义 + 归档执行引擎）
# 参考：docs/add/contract.md

# ── 资产组成 ──────────────────────────────────────────

assets:
  # 商业需求文档
  brd:
    title: 商业需求文档
    type: docs
    category: brd
    path: docs/brd
    description: 创始人知识库迁移痛点、业务场景、成功标准

  # 产品需求文档
  prd:
    title: 产品需求文档
    type: docs
    category: prd
    path: docs/prd
    description: 产品定位、数字资产边界、契约定义、工作流设计

  # 交互设计文档
  ixd:
    title: 交互设计文档
    type: docs
    category: ixd
    path: docs/ixd
    description: 设计原则、核心界面、交互流程

  # 架构设计文档
  add:
    title: 架构设计文档
    type: docs
    category: add
    path: docs/add
    description: CLI 三层架构、契约技术规范、ISDL DSL 设计

  # 质量保证文档
  qa:
    title: 质量保证文档
    type: docs
    category: qa
    path: docs/qa
    description: 架构决策记录（Q001-Q008）

  # 用户文档
  user_docs:
    title: 用户文档
    type: docs
    category: user
    path: docs/user
    description: 安装、快速开始、配置参考、归档命令详解

  # CLI 设计文档
  cli_docs:
    title: CLI 设计文档
    type: docs
    category: cli_docs
    path: src/cli/docs
    description: cli.py、planner.py、file_operator.py 的设计文档

  # CLI 实现代码
  cli_code:
    title: CLI 实现代码
    type: code
    category: cli
    path: src/cli/app
    description: >
      三层解耦架构：
      - cli.py（入口层）
      - planner.py（配置层）
      - file_operator.py（操作层）

  # CLI 测试
  cli_tests:
    title: CLI 测试代码
    type: code
    category: cli_tests
    path: src/cli/tests
    description: planner 和 file_operator 的单元测试

  # Studio 客户端
  studio:
    title: Studio 客户端
    type: code
    category: studio
    path: src/studio
    description: Flutter Web 应用，数字资产可视化管理界面

  # Provider 服务端
  provider:
    title: Provider 服务端
    type: code
    category: provider
    path: src/provider
    description: FastAPI 服务，对接阿里云函数计算和 OSS

  # Docker 部署配置
  docker_manifests:
    title: Docker 部署配置
    type: config
    category: docker
    path: manifests/docker
    description: Studio 和 Provider 的 Dockerfile 及 docker-compose 编排

  # 集成测试 fixtures
  fixtures:
    title: 集成测试夹具
    type: code
    category: fixtures
    path: assets/fixtures
    description: ISDL 工作流示例、契约模板

  # 示例与原型验证
  examples:
    title: 示例与原型验证
    type: experiment
    category: examples
    path: examples
    description: >
      归档流程验证（examples/archive/）
      AI 路线图生成验证（examples/roadmap/）
      文档工作流可视化（examples/studio/）

  # 根文档
  root_docs:
    title: 根目录文档
    type: docs
    category: root
    path: .
    description: README、ROADMAP、文档目录导航

  # 阿里云基础设施代码
  aliyun_iac:
    title: 阿里云基础设施代码
    type: config
    category: iac
    path: manifests/iac
    description: 函数计算（FC）、OSS、VPC、触发器等基础设施定义

# ── 技能定义 ──────────────────────────────────────────

skills:
  # 产品日志归档
  archive-journal:
    title: 产品日志归档
    description: 将 examples/archive/sample/journal 中的产品日志移动到 archive
    domain: ops
    commands:
      - mv examples/archive/sample/journal/*.md examples/archive/sample/archive/

  # 契约配置归档
  archive-contracts:
    title: 契约配置归档
    description: 将 src/cli/contracts.yaml 中定义的契约路径从 journal 移动到 archive
    domain: ops

  # 运行测试
  test:
    title: 运行测试
    description: 执行 CLI 单元和集成测试
    domain: devops

  # 代码质量检查
  lint:
    title: 代码质量检查
    description: Ruff 检查和格式化
    domain: devops
